<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meshtastic Docs</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #1e2235;
      --border:   #2e3348;
      --accent:   #67e8f9;
      --accent2:  #a78bfa;
      --accent3:  #34d399;
      --accent4:  #fb923c;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --dim:      #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.7;
      padding: 0 0 80px;
    }

    /* ── top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 5vw;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .topbar a.back {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .topbar a.back:hover { color: var(--accent); }
    .topbar a.back::before { content: '←'; }
    .topbar .doc-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
      flex: 1;
    }
    .topbar .file-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .topbar .file-links a {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      padding: 3px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }
    .topbar .file-links a:hover,
    .topbar .file-links a.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ── content ── */
    .content {
      max-width: 80vw;
      margin: 0 auto;
      padding: 36px 0;
    }

    /* ── loading / error ── */
    .status {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status.error { color: #f87171; }

    /* ── markdown styles ── */
    .md h1 { font-size: 1.8rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; margin: 32px 0 16px; }
    .md h1:first-child { margin-top: 0; }
    .md h2 { font-size: 1.25rem; color: var(--accent2); border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 28px 0 12px; }
    .md h3 { font-size: 1.05rem; color: var(--accent3); margin: 22px 0 10px; }
    .md h4 { font-size: 0.95rem; color: var(--accent4); margin: 18px 0 8px; }

    .md p { margin: 0 0 12px; }
    .md strong { color: var(--text); }
    .md em { color: var(--dim); }

    .md a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
    .md a:hover { border-bottom-color: var(--accent); }

    .md ul, .md ol { margin: 0 0 12px 1.4em; }
    .md li { margin-bottom: 4px; }

    .md hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .md blockquote {
      border-left: 3px solid var(--accent2);
      margin: 0 0 12px;
      padding: 8px 16px;
      background: var(--surface2);
      border-radius: 0 6px 6px 0;
      color: var(--dim);
    }

    .md code {
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82em;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--accent3);
    }

    .md pre {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 16px;
    }
    .md pre code {
      background: none;
      border: none;
      padding: 0;
      color: inherit;
      font-size: 0.83rem;
    }

    /* ── tables ── */
    .md .table-wrap {
      overflow-x: auto;
      margin: 0 0 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .md table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 500px;
    }
    .md thead th {
      background: var(--surface2);
      padding: 9px 14px;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .md tbody td {
      padding: 8px 14px;
      border-bottom: 1px solid #1c1f2e;
      vertical-align: top;
    }
    .md tbody tr:last-child td { border-bottom: none; }
    .md tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .md tbody td code { font-size: 0.78em; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="back" href="#" onclick="history.back(); return false;">Presentation</a>
  <span class="doc-title" id="doc-title">Documentation</span>
  <nav class="file-links">
    <a href="?file=MESHTASTIC_SENSORS.md" id="link-sensors">Sensors</a>
    <a href="?file=MESHTASTIC_DEVICES_MODULES.md" id="link-devices">Devices &amp; Modules</a>
    <a href="MESHTASTIC_PACKET_DIAGRAM.html">Packet Diagram</a>
    <a href="MESHTASTIC_SEQUENCE_DIAGRAM.html">Sequence Diagram</a>
  </nav>
</div>

<div class="content">
  <div id="output" class="status">Loading…</div>
</div>

<script>
const FILE_TITLES = {
  'MESHTASTIC_SENSORS.md':        'Telemetry Sensors Reference',
  'MESHTASTIC_DEVICES_MODULES.md': 'Devices & Modules Reference',
};

const FILE_LINK_IDS = {
  'MESHTASTIC_SENSORS.md':        'link-sensors',
  'MESHTASTIC_DEVICES_MODULES.md': 'link-devices',
};

// Configure marked with highlight.js
marked.setOptions({
  highlight(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  gfm: true,
  breaks: false,
});

// Wrap tables in a scrollable div
const renderer = new marked.Renderer();
renderer.table = function(header, body) {
  return `<div class="table-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
};
marked.setOptions({ renderer });

async function load() {
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  const output = document.getElementById('output');

  if (!file) {
    // No file specified — show index of available docs
    output.className = 'md';
    output.innerHTML = `
      <h1>Meshtastic Documentation</h1>
      <p>Select a document to view:</p>
      <ul>
        <li><a href="?file=MESHTASTIC_SENSORS.md">Telemetry Sensors Reference</a></li>
        <li><a href="?file=MESHTASTIC_DEVICES_MODULES.md">Devices &amp; Modules Reference</a></li>
        <li><a href="MESHTASTIC_PACKET_DIAGRAM.html">Packet Diagram</a></li>
        <li><a href="MESHTASTIC_SEQUENCE_DIAGRAM.html">Sequence Diagram</a></li>
      </ul>`;
    return;
  }

  // Mark active tab
  const linkId = FILE_LINK_IDS[file];
  if (linkId) document.getElementById(linkId)?.classList.add('active');

  // Update page title
  const title = FILE_TITLES[file] || file;
  document.title = title + ' — Meshtastic Docs';
  document.getElementById('doc-title').textContent = title;

  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    output.className = 'md';
    output.innerHTML = marked.parse(md);
  } catch (err) {
    output.className = 'status error';
    output.textContent = `Failed to load "${file}": ${err.message}. Make sure you are serving this via a local HTTP server.`;
  }
}

load();
</script>
</body>
</html>
